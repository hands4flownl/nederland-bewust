backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/makers"
public_folder: "/assets/images/makers"

# Geen editorial workflow - bewust-makers publiceren direct
# publish_mode: editorial_workflow

locale: 'nl'

collections:

  - name: "bewust-makers"
    label: "Bewust-Makers"
    label_singular: "Bewust-Maker"
    folder: "_bewust-makers"
    create: true
    slug: "{{slug}}"
    identifier_field: naam
    summary: "{{naam}} – {{praktijk}} ({{provincie}})"
    fields:

      - {label: "Naam", name: "naam", widget: "string", hint: "Voor- en achternaam"}
      - {label: "Praktijknaam", name: "praktijk", widget: "string"}
      - {label: "Profielfoto", name: "foto", widget: "image", required: false, hint: "Vierkant portretfoto, minimaal 400×400px"}
      - label: "Provincie"
        name: "provincie"
        widget: "select"
        options: ["Drenthe","Groningen","Friesland","Overijssel","Gelderland","Utrecht","Noord-Holland","Zuid-Holland","Zeeland","Noord-Brabant","Limburg","Flevoland"]
      - {label: "Stad / gemeente", name: "stad", widget: "string", required: false}
      - label: "Categorieën"
        name: "categorieen"
        widget: "select"
        multiple: true
        options: ["Massage","Voeding","Bewegen","Meditatie","Coaching","Energetisch","Coaching met dieren","Kindgericht","Hulp voor huisdieren","Expressie / Creativiteit"]
      - {label: "Methoden / specialismen", name: "methoden", widget: "list", hint: "Eén methode per regel"}
      - {label: "Website", name: "website", widget: "string", required: false, hint: "https://jouwwebsite.nl"}
      - {label: "E-mailadres (zichtbaar op profiel)", name: "email_zichtbaar", widget: "string", required: false}
      - {label: "Telefoonnummer", name: "telefoon", widget: "string", required: false}
      - label: "Online sessies"
        name: "online"
        widget: "select"
        options: ["Ja","Nee","Op aanvraag"]
        default: "Op aanvraag"
      - {label: "Sessieduur", name: "sessieduur", widget: "string", required: false, hint: "Bijv. 60 min"}
      - {label: "Tarief", name: "tarief", widget: "string", required: false, hint: "Bijv. €75 per sessie"}
      - label: "Eerste gesprek"
        name: "eerste_gesprek"
        widget: "select"
        options: ["Gratis kennismaking","Gratis (30 min)","Op aanvraag","Betaald"]
        default: "Gratis kennismaking"
      - {label: "Vergoeding zorgverzekeraar", name: "vergoeding", widget: "string", required: false}
      - {label: "Jaren werkervaring", name: "ervaringsjaren", widget: "number", required: false, value_type: "int", min: 0, max: 50}
      - {label: "Talen", name: "talen", widget: "list", default: ["Nederlands"]}
      - {label: "Doelgroepen", name: "doelgroepen", widget: "list", hint: "Bijv. Volwassenen, Vrouwen, Kinderen"}
      - {label: "Opleidingen & certificeringen", name: "opleidingen", widget: "list", hint: "Eén opleiding per regel"}
      - {label: "Beroepsverenigingen", name: "verenigingen", widget: "list", required: false}

      - {label: "Korte introductie", name: "bio", widget: "text", hint: "2–4 zinnen. Schrijf zoals je praat."}
      - {label: "Waarom is dit jouw werk?", name: "waarom", widget: "text", required: false, hint: "Het moment of de ervaring die je naar dit werk bracht."}
      - {label: "Wat maakt jou anders dan andere therapeuten?", name: "onderscheid", widget: "text", required: false, hint: "Concreet en eerlijk."}
      - {label: "Waarvoor bel je mij wél — en waarvoor niet?", name: "voor_wie", widget: "text", required: false, hint: "Voor welke situaties ben jij de juiste persoon?"}
      - {label: "Wat zeggen cliënten over jou?", name: "wat_zeggen_clienten", widget: "text", required: false, hint: "In de woorden van je cliënten."}
      - {label: "Wat geef je mee na een sessie?", name: "na_sessie", widget: "text", required: false}

      - {label: "Gepubliceerd", name: "gepubliceerd", widget: "boolean", default: true}
      - {label: "Uitgelicht op homepage", name: "uitgelicht", widget: "boolean", default: false}
      - {label: "Lidmaatschap", name: "lidmaatschap", widget: "select", options: ["Bewust-maker","Mee-maker"], default: "Bewust-maker"}

  - name: "agenda"
    label: "Agenda"
    label_singular: "Activiteit"
    folder: "_agenda"
    create: true
    slug: "{{jaar}}-{{maand}}-{{dag}}-{{slug}}"
    summary: "{{datum}} – {{titel}}"
    fields:
      - {label: "Titel", name: "titel", widget: "string"}
      - {label: "Datum", name: "datum", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false}
      - {label: "Tijdstip", name: "tijdstip", widget: "string", required: false, hint: "Bijv. 09:00–11:00"}
      - {label: "Locatie", name: "locatie", widget: "string"}
      - {label: "Organisator", name: "organisator", widget: "string"}
      - {label: "Beschrijving", name: "beschrijving", widget: "text"}
      - {label: "Aanmeldlink of contactinfo", name: "aanmeld", widget: "string", required: false}
      - {label: "Gepubliceerd", name: "gepubliceerd", widget: "boolean", default: true}

  - name: "instellingen"
    label: "Site-instellingen"
    files:
      - label: "Homepage & tellers"
        name: "algemeen"
        file: "_data/instellingen.yml"
        fields:
          - {label: "Inspiratie: naam auteur", name: "inspiratie_auteur", widget: "string"}
          - {label: "Inspiratie: titel artikel", name: "inspiratie_titel", widget: "string"}
          - {label: "Inspiratie: intro-tekst", name: "inspiratie_intro", widget: "text"}
          - {label: "Inspiratie: link naar artikel", name: "inspiratie_link", widget: "string"}
          - {label: "Inspiratie: foto (bestandsnaam)", name: "inspiratie_foto", widget: "string"}
          - {label: "Teller: aantal Bewust-makers", name: "teller_bewust_makers", widget: "number", value_type: "int"}
          - {label: "Teller: aantal Mee-makers", name: "teller_mee_makers", widget: "number", value_type: "int"}
