backend:
  name: github
  repo: hands4flownl/nederland-bewust
  branch: main
  # Bewust-makers loggen in via uitnodiging (Netlify Identity)
  # Superuser (jij) heeft toegang tot alles

# Sta media uploads toe
media_folder: "assets/images/makers"
public_folder: "/assets/images/makers"

# Uitnodigingen via e-mail (Netlify Identity)
publish_mode: editorial_workflow

collections:

  # ── BEWUST-MAKERS ──────────────────────────────────────────────────────────
  - name: "bewust-makers"
    label: "Bewust-Makers"
    label_singular: "Bewust-Maker"
    folder: "_bewust-makers"
    create: true
    slug: "{{slug}}"
    identifier_field: naam
    summary: "{{naam}} – {{praktijk}} ({{provincie}})"

    fields:

      # ── BASISINFO ──
      - label: "Naam"
        name: "naam"
        widget: "string"
        hint: "Voor- en achternaam"

      - label: "Praktijknaam"
        name: "praktijk"
        widget: "string"
        hint: "Naam van je praktijk of bedrijf"

      - label: "Profielfoto"
        name: "foto"
        widget: "image"
        required: false
        hint: "Uploaden als vierkant portretfoto (minimaal 400×400px)"

      - label: "Provincie"
        name: "provincie"
        widget: "select"
        options:
          - "Drenthe"
          - "Groningen"
          - "Friesland"
          - "Overijssel"
          - "Gelderland"
          - "Utrecht"
          - "Noord-Holland"
          - "Zuid-Holland"
          - "Zeeland"
          - "Noord-Brabant"
          - "Limburg"
          - "Flevoland"

      - label: "Stad / gemeente"
        name: "stad"
        widget: "string"
        required: false
        hint: "Bijv. Emmen, Assen, Hoogeveen"

      - label: "Categorieën"
        name: "categorieen"
        widget: "select"
        multiple: true
        options:
          - "Massage"
          - "Voeding"
          - "Bewegen"
          - "Meditatie"
          - "Coaching"
          - "Energetisch"
          - "Coaching met dieren"
          - "Kindgericht"
          - "Hulp voor huisdieren"
          - "Expressie / Creativiteit"
        hint: "Selecteer alle categorieën die van toepassing zijn"

      - label: "Methoden / specialismen"
        name: "methoden"
        widget: "list"
        hint: "Bijv. REIKI, Voetreflexologie, PSYCH-K® — één per regel"

      # ── CONTACT & PRAKTISCH ──
      - label: "Website"
        name: "website"
        widget: "string"
        required: false
        hint: "https://jouwwebsite.nl"

      - label: "E-mailadres (zichtbaar op profiel)"
        name: "email_zichtbaar"
        widget: "string"
        required: false
        hint: "Laat leeg als je geen e-mail op je profiel wilt"

      - label: "Telefoonnummer (zichtbaar op profiel)"
        name: "telefoon"
        widget: "string"
        required: false

      - label: "Online sessies mogelijk?"
        name: "online"
        widget: "select"
        options: ["Ja", "Nee", "Op aanvraag"]
        default: "Op aanvraag"

      - label: "Sessieduur"
        name: "sessieduur"
        widget: "string"
        required: false
        hint: "Bijv. 60 min of 60–90 min"

      - label: "Tarief"
        name: "tarief"
        widget: "string"
        required: false
        hint: "Bijv. €75 per sessie. Laat leeg als je dit niet wilt vermelden."

      - label: "Eerste gesprek"
        name: "eerste_gesprek"
        widget: "select"
        options: ["Gratis kennismaking", "Gratis (30 min)", "Op aanvraag", "Betaald"]
        default: "Gratis kennismaking"

      - label: "Vergoeding zorgverzekeraar"
        name: "vergoeding"
        widget: "string"
        required: false
        hint: "Bijv. Mogelijk via aanvullend pakket (check bij jouw verzekeraar)"

      - label: "Talen"
        name: "talen"
        widget: "list"
        default: ["Nederlands"]
        hint: "In welke talen werk jij?"

      # ── OPLEIDING & KWALIFICATIES ──
      - label: "Opleidingen & certificeringen"
        name: "opleidingen"
        widget: "list"
        hint: "Eén opleiding of certificaat per regel — bijv. REIKI Master gecertificeerd"

      - label: "Beroepsverenigingen"
        name: "verenigingen"
        widget: "list"
        required: false
        hint: "Bijv. NVA, NVST, RBCZ — één per regel"

      - label: "Jaren werkervaring"
        name: "ervaringsjaren"
        widget: "number"
        required: false
        value_type: "int"
        min: 0
        max: 50

      - label: "Doelgroepen"
        name: "doelgroepen"
        widget: "list"
        hint: "Voor wie is jouw werk het meest geschikt? Bijv. Volwassenen, Vrouwen, Kinderen, Senioren"

      # ── JOUW VERHAAL (de onderscheidende vragen) ──
      - label: "Korte introductie"
        name: "bio"
        widget: "text"
        hint: "2–4 zinnen over wie je bent en wat je doet. Schrijf zoals je praat — geen verkooptekst."

      - label: "Waarom is dit jouw werk?"
        name: "waarom"
        widget: "text"
        hint: "Wat was het moment of de ervaring die je naar dit werk bracht? Dit mag persoonlijk zijn."

      - label: "Wat maakt jou anders dan andere therapeuten?"
        name: "onderscheid"
        widget: "text"
        hint: "Wat doe jij dat anderen niet doen, of anders doen? Wees concreet."

      - label: "Waarvoor bel je mij wél — en waarvoor juist niet?"
        name: "voor_wie"
        widget: "text"
        hint: "Eerlijkheid wekt vertrouwen. Voor welke situaties ben jij de juiste persoon? En wanneer verwijs je door?"

      - label: "Wat zegt een cliënt na drie sessies over jou?"
        name: "wat_zeggen_clienten"
        widget: "text"
        hint: "Beschrijf in de woorden van je cliënten wat ze merken of ervaren. Geen letterlijk citaat nodig."

      - label: "Wat geef je een cliënt mee naar huis na een sessie?"
        name: "na_sessie"
        widget: "text"
        required: false
        hint: "Een gevoel, inzicht, oefening, of iets anders concreets?"

      # ── ZICHTBAARHEID (alleen superuser) ──
      - label: "Gepubliceerd"
        name: "gepubliceerd"
        widget: "boolean"
        default: true
        hint: "Zet uit om het profiel tijdelijk te verbergen"

      - label: "Uitgelicht op homepage"
        name: "uitgelicht"
        widget: "boolean"
        default: false
        hint: "Alleen superuser: toon dit profiel in de homepage-selectie"

      - label: "Lidmaatschap"
        name: "lidmaatschap"
        widget: "select"
        options: ["Bewust-maker", "Mee-maker"]
        default: "Bewust-maker"

  # ── AGENDA ─────────────────────────────────────────────────────────────────
  - name: "agenda"
    label: "Agenda"
    label_singular: "Activiteit"
    folder: "_agenda"
    create: true
    slug: "{{jaar}}-{{maand}}-{{dag}}-{{slug}}"
    summary: "{{datum}} – {{titel}} ({{organisator}})"

    fields:
      - label: "Titel activiteit"
        name: "titel"
        widget: "string"

      - label: "Datum"
        name: "datum"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD-MM-YYYY"
        time_format: false

      - label: "Tijdstip"
        name: "tijdstip"
        widget: "string"
        required: false
        hint: "Bijv. 09:00–11:00"

      - label: "Locatie"
        name: "locatie"
        widget: "string"
        hint: "Stad of Online"

      - label: "Organisator"
        name: "organisator"
        widget: "string"
        hint: "Jouw naam of praktijknaam"

      - label: "Beschrijving"
        name: "beschrijving"
        widget: "text"

      - label: "Aanmeldlink of contactinfo"
        name: "aanmeld"
        widget: "string"
        required: false
        hint: "URL of e-mailadres voor aanmelding"

      - label: "Gepubliceerd"
        name: "gepubliceerd"
        widget: "boolean"
        default: true

  # ── SITE-INSTELLINGEN (alleen superuser) ───────────────────────────────────
  - name: "instellingen"
    label: "Site-instellingen"
    files:
      - label: "Algemene instellingen"
        name: "algemeen"
        file: "_data/instellingen.yml"
        fields:
          - label: "Maandelijks inspiratie-artikel: naam auteur"
            name: "inspiratie_auteur"
            widget: "string"
          - label: "Maandelijks inspiratie-artikel: titel"
            name: "inspiratie_titel"
            widget: "string"
          - label: "Maandelijks inspiratie-artikel: intro-tekst"
            name: "inspiratie_intro"
            widget: "text"
          - label: "Maandelijks inspiratie-artikel: link"
            name: "inspiratie_link"
            widget: "string"
          - label: "Maandelijks inspiratie-artikel: foto-naam"
            name: "inspiratie_foto"
            widget: "string"
            hint: "Bestandsnaam in assets/images/makers/"
          - label: "Teller: aantal Bewust-makers"
            name: "teller_bewust_makers"
            widget: "number"
            value_type: "int"
          - label: "Teller: aantal Mee-makers"
            name: "teller_mee_makers"
            widget: "number"
            value_type: "int"
