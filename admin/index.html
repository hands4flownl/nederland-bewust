<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Nederland-Bewust Beheer</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
  DecapCms.init({ config: {
    backend: { name: "git-gateway", branch: "main" },
    media_folder: "assets/images/makers",
    public_folder: "/assets/images/makers",
    locale: "nl",
    collections: [
      {
        name: "bewust-makers",
        label: "Bewust-maker profielen",
        folder: "_bewust-makers",
        create: false,
        identifier_field: "naam",
        summary: "{{naam}} - {{praktijk}}",
        fields: [
          {label:"Naam", name:"naam", widget:"string"},
          {label:"Praktijknaam", name:"praktijk", widget:"string"},
          {label:"Profielfoto", name:"foto", widget:"image", required:false},
          {label:"Provincie", name:"provincie", widget:"select", options:["Drenthe","Groningen","Friesland","Overijssel","Gelderland","Utrecht","Noord-Holland","Zuid-Holland","Zeeland","Noord-Brabant","Limburg","Flevoland"]},
          {label:"Stad", name:"stad", widget:"string", required:false},
          {label:"Categorieën", name:"categorieen", widget:"select", multiple:true, options:["Massage","Voeding","Bewegen","Meditatie","Coaching","Energetisch","Coaching met dieren","Kindgericht","Hulp voor huisdieren","Expressie / Creativiteit"]},
          {label:"Methoden", name:"methoden", widget:"list"},
          {label:"Klachten", name:"klachten", widget:"list", required:false},
          {label:"Omschrijving", name:"omschrijving", widget:"text", required:false},
          {label:"Website", name:"website", widget:"string", required:false},
          {label:"E-mailadres zichtbaar", name:"email_zichtbaar", widget:"string", required:false},
          {label:"Telefoonnummer", name:"telefoon", widget:"string", required:false},
          {label:"Online sessies", name:"online", widget:"select", options:["Ja","Nee","Op aanvraag"], default:"Op aanvraag"},
          {label:"Sessieduur", name:"sessieduur", widget:"string", required:false},
          {label:"Tarief", name:"tarief", widget:"string", required:false},
          {label:"Eerste gesprek", name:"eerste_gesprek", widget:"select", options:["Gratis kennismaking","Gratis (30 min)","Op aanvraag","Betaald"], default:"Gratis kennismaking"},
          {label:"Vergoeding", name:"vergoeding", widget:"string", required:false},
          {label:"Ervaringsjaren", name:"ervaringsjaren", widget:"number", required:false, value_type:"int"},
          {label:"Talen", name:"talen", widget:"list", default:["Nederlands"]},
          {label:"Doelgroepen", name:"doelgroepen", widget:"list", required:false},
          {label:"Opleidingen", name:"opleidingen", widget:"list", required:false},
          {label:"Verenigingen", name:"verenigingen", widget:"list", required:false},
          {label:"Bio", name:"bio", widget:"text"},
          {label:"Waarom dit werk", name:"waarom", widget:"text", required:false},
          {label:"Onderscheid", name:"onderscheid", widget:"text", required:false},
          {label:"Voor wie", name:"voor_wie", widget:"text", required:false},
          {label:"Wat zeggen clienten", name:"wat_zeggen_clienten", widget:"text", required:false},
          {label:"Na een sessie", name:"na_sessie", widget:"text", required:false},
          {label:"Gepubliceerd", name:"gepubliceerd", widget:"boolean", default:true},
          {label:"Uitgelicht", name:"uitgelicht", widget:"boolean", default:false},
          {label:"Lidmaatschap", name:"lidmaatschap", widget:"select", options:["Bewust-maker","Mee-maker"], default:"Bewust-maker"},
          {label:"Layout", name:"layout", widget:"hidden", default:"bewust-maker"},
          {label:"Permalink", name:"permalink", widget:"hidden", default:""}
        ]
      },
      {
        name: "bewust-makers-nieuw",
        label: "Nieuw profiel aanmaken",
        folder: "_bewust-makers",
        create: true,
        identifier_field: "naam",
        fields: [
          {label:"Naam", name:"naam", widget:"string"},
          {label:"Praktijknaam", name:"praktijk", widget:"string"},
          {label:"Provincie", name:"provincie", widget:"select", options:["Drenthe","Groningen","Friesland","Overijssel","Gelderland","Utrecht","Noord-Holland","Zuid-Holland","Zeeland","Noord-Brabant","Limburg","Flevoland"]},
          {label:"Stad", name:"stad", widget:"string", required:false},
          {label:"Methoden", name:"methoden", widget:"list"},
          {label:"Bio", name:"bio", widget:"text"},
          {label:"Gepubliceerd", name:"gepubliceerd", widget:"boolean", default:false},
          {label:"Layout", name:"layout", widget:"hidden", default:"bewust-maker"},
          {label:"Permalink", name:"permalink", widget:"hidden", default:""}
        ]
      },
      {
        name: "agenda",
        label: "Agenda",
        folder: "_agenda",
        create: true,
        identifier_field: "titel",
        fields: [
          {label:"Titel", name:"titel", widget:"string"},
          {label:"Doorlopend", name:"doorlopend", widget:"boolean", default:false},
          {label:"Datum", name:"datum", widget:"string", required:false, hint:"Formaat JJJJ-MM-DD"},
          {label:"Tijdstip", name:"tijdstip", widget:"string", required:false},
          {label:"Locatie", name:"locatie", widget:"string"},
          {label:"Organisator", name:"organisator", widget:"string"},
          {label:"Beschrijving", name:"beschrijving", widget:"text"},
          {label:"Aanmeldlink", name:"aanmeld", widget:"string", required:false},
          {label:"Prijs", name:"prijs", widget:"string", required:false},
          {label:"Gepubliceerd", name:"gepubliceerd", widget:"boolean", default:true}
        ]
      },
      {
        name: "mee-makers",
        label: "Mee-Makers",
        folder: "_mee-makers",
        create: true,
        identifier_field: "naam",
        fields: [
          {label:"Naam", name:"naam", widget:"string"},
          {label:"Logo", name:"logo", widget:"image", required:false},
          {label:"Beschrijving", name:"beschrijving", widget:"text", required:false},
          {label:"Website", name:"website", widget:"string", required:false},
          {label:"Provincie", name:"provincie", widget:"select", options:["Drenthe","Groningen","Friesland","Overijssel","Gelderland","Utrecht","Noord-Holland","Zuid-Holland","Zeeland","Noord-Brabant","Limburg","Flevoland"]},
          {label:"Gepubliceerd", name:"gepubliceerd", widget:"boolean", default:true},
          {label:"Layout", name:"layout", widget:"hidden", default:"mee-maker"},
          {label:"Permalink", name:"permalink", widget:"hidden", default:""},
          {label:"Lidmaatschap", name:"lidmaatschap", widget:"hidden", default:"Mee-maker"}
        ]
      },
      {
        name: "kennisbank",
        label: "Kennisbank",
        folder: "_kennisbank",
        create: true,
        identifier_field: "titel",
        fields: [
          {label:"Titel", name:"titel", widget:"string"},
          {label:"Categorie", name:"categorie", widget:"select", options:["Massage","Voeding","Bewegen","Meditatie","Coaching","Energetisch","Coaching met dieren","Kindgericht","Hulp voor huisdieren","Expressie / Creativiteit","Begrip"]},
          {label:"Ook bekend als", name:"ook_bekend_als", widget:"string", required:false},
          {label:"Geschikt voor", name:"geschikt_voor", widget:"string", required:false},
          {label:"Inleiding", name:"inleiding", widget:"text"},
          {label:"Beschrijving", name:"body", widget:"markdown"},
          {label:"Wat te verwachten", name:"wat_te_verwachten", widget:"text", required:false},
          {label:"Voor wie", name:"voor_wie", widget:"text", required:false},
          {label:"Niet geschikt voor", name:"niet_voor", widget:"text", required:false},
          {label:"Bronnen", name:"bronnen", widget:"string", required:false},
          {label:"Gepubliceerd", name:"gepubliceerd", widget:"boolean", default:false},
          {label:"Layout", name:"layout", widget:"hidden", default:"kennisbank-artikel"}
        ]
      },
      {
        name: "teksten",
        label: "Teksten aanpassen",
        files: [
          {
            label: "Homepage",
            name: "homepage",
            file: "_data/teksten_homepage.yml",
            fields: [
              {label:"Hero label", name:"hero_label", widget:"string"},
              {label:"Hoofdtitel", name:"hero_titel", widget:"string"},
              {label:"Subtitel", name:"hero_subtitel", widget:"string"},
              {label:"Hero tekst", name:"hero_tekst", widget:"text"},
              {label:"Knop 1", name:"hero_knop1", widget:"string"},
              {label:"Knop 2", name:"hero_knop2", widget:"string"},
              {label:"Zoekbalk titel", name:"zoek_titel", widget:"string"},
              {label:"Pijlers titel", name:"pijlers_titel", widget:"string"},
              {label:"Pijlers tekst", name:"pijlers_tekst", widget:"text"},
              {label:"Pijler 1 titel", name:"pijler1_titel", widget:"string"},
              {label:"Pijler 1 tekst", name:"pijler1_tekst", widget:"text"},
              {label:"Pijler 2 titel", name:"pijler2_titel", widget:"string"},
              {label:"Pijler 2 tekst", name:"pijler2_tekst", widget:"text"},
              {label:"Pijler 3 titel", name:"pijler3_titel", widget:"string"},
              {label:"Pijler 3 tekst", name:"pijler3_tekst", widget:"text"},
              {label:"Adviesgesprek titel", name:"intake_titel", widget:"string"},
              {label:"Adviesgesprek tekst", name:"intake_tekst", widget:"text"},
              {label:"Adviesgesprek knop", name:"intake_knop", widget:"string"},
              {label:"CTA titel", name:"cta_titel", widget:"string"},
              {label:"CTA tekst", name:"cta_tekst", widget:"text"}
            ]
          },
          {
            label: "Over-pagina",
            name: "over",
            file: "_data/teksten_over.yml",
            fields: [
              {label:"Paginatitel", name:"titel", widget:"string"},
              {label:"Subtitel", name:"subtitel", widget:"string"},
              {label:"Intro", name:"intro", widget:"text"},
              {label:"Missie titel", name:"missie_titel", widget:"string"},
              {label:"Missie tekst", name:"missie_tekst", widget:"text"},
              {label:"Visie titel", name:"visie_titel", widget:"string"},
              {label:"Visie tekst", name:"visie_tekst", widget:"text"},
              {label:"Visie citaat", name:"visie_quote", widget:"string"}
            ]
          },
          {
            label: "Contactpagina",
            name: "contact",
            file: "_data/teksten_contact.yml",
            fields: [
              {label:"Paginatitel", name:"titel", widget:"string"},
              {label:"Subtitel", name:"subtitel", widget:"string"},
              {label:"Intro", name:"intro", widget:"text"},
              {label:"Formulier titel", name:"formulier_titel", widget:"string"}
            ]
          },
          {
            label: "Tellers en inspiratie",
            name: "instellingen",
            file: "_data/instellingen.yml",
            fields: [
              {label:"Naam auteur", name:"inspiratie_auteur", widget:"string"},
              {label:"Functie auteur", name:"inspiratie_functie", widget:"string"},
              {label:"Artikel titel", name:"inspiratie_titel", widget:"string"},
              {label:"Intro tekst", name:"inspiratie_intro", widget:"text"},
              {label:"Link artikel", name:"inspiratie_link", widget:"string"},
              {label:"Foto auteur", name:"inspiratie_foto", widget:"image", required:false},
              {label:"Aantal Bewust-makers", name:"teller_bewust_makers", widget:"number", value_type:"int"},
              {label:"Aantal Mee-makers", name:"teller_mee_makers", widget:"number", value_type:"int"}
            ]
          }
        ]
      },
      {
        name: "uitnodigingen",
        label: "Bewust-maker uitnodigen",
        files: [
          {
            label: "Uitnodiging",
            name: "uitnodiging",
            file: "_data/uitnodigingen.yml",
            fields: [
              {label:"Naam", name:"naam", widget:"string"},
              {label:"E-mailadres", name:"email", widget:"string"},
              {label:"Type", name:"type", widget:"select", options:["Bewust-maker","Mee-maker"], default:"Bewust-maker"},
              {label:"Notitie", name:"notitie", widget:"text", required:false},
              {label:"Status", name:"status", widget:"select", options:["Te verwerken","Uitnodiging verstuurd","Actief"], default:"Te verwerken"}
            ]
          }
        ]
      }
    ]
  }});
  </script>
</body>
</html>
