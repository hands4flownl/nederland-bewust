<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.beschrijving %}{{ page.beschrijving }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}">
  <meta property="og:description" content="{% if page.beschrijving %}{{ page.beschrijving }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="nl_NL">
  <link rel="icon" href="{{ '/' | relative_url }}wp-content/uploads/2026/03/cropped-cropped-Nederland-bewust-compleet-scaled-1-270x270.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/stijl.css' | relative_url }}">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    window.addEventListener('load', function() {
      if (window.netlifyIdentity) {
        // Na login: ga naar welkomstpagina (eerste keer) of admin
        window.netlifyIdentity.on('login', function(user) {
          var huidig = window.location.pathname;
          // Als we op een gewone pagina zijn (niet admin), stuur naar welkom
          if (!huidig.startsWith('/admin')) {
            window.location.href = '/welkom-beheer/';
          }
        });
        window.netlifyIdentity.on('logout', function() {
          window.location.href = '/';
        });
      }
    });
  </script>
  <script>
    window.addEventListener('load', function() {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function(user) {
          if (!user) {
            window.netlifyIdentity.on('login', function(user) {
              // Nieuwe gebruiker (eerste login via uitnodiging): naar welkomstpagina
              // Bestaande gebruiker: naar beheerpaneel
              var isNieuw = !user.user_metadata || !user.user_metadata.gezien;
              if (isNieuw) {
                document.location.href = '/welkom-beheer/';
              } else {
                document.location.href = '/admin/';
              }
            });
          }
        });
      }
    });
  </script>
  <script>
    window.addEventListener('load', function() {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function(user) {
          if (!user) {
            window.netlifyIdentity.on('login', function() {
              document.location.href = '/admin/';
            });
          } else {
            // Al ingelogd en op een gewone pagina? Ga naar admin
            if (!window.location.pathname.startsWith('/admin')) {
              document.location.href = '/admin/';
            }
          }
        });
      }
    });
  </script>
</head>
<body>
  {% include nav.html %}
  <main id="content">{{ content }}</main>
  {% include footer.html %}
  <script src="{{ '/assets/js/hoofd.js' | relative_url }}"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
