collections:
  bewust-makers:
    output: true
    permalink: /bewust-makers/:slug/
  agenda:
    output: false
  mee-makers:
    output: true
    permalink: /mee-makers/:slug/
  kennisbank:
    output: true
    permalink: /kennisbank/:slug/

defaults:
  - scope:
      path: ""
      type: "bewust-makers"
    values:
      layout: "bewust-maker"
      gepubliceerd: true
  - scope:
      path: ""
      type: "mee-makers"
    values:
      layout: "mee-maker"
      gepubliceerd: true
  - scope:
      path: ""
      type: "kennisbank"
    values:
      layout: "kennisbank-artikel"
      gepubliceerd: true

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - netlify.toml
  - _config_netlify.yml
  - maker-beheer


