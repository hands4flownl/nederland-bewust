baseurl: "/nederland-bewust"
url: "https://hands4flownl.github.io"

lang: nl
timezone: Europe/Amsterdam
markdown: kramdown
highlighter: rouge
permalink: pretty

formspree_contact:      "https://formspree.io/f/xdavjnjk"
