# Over-pagina teksten — aanpassen via /admin/
titel: "Over Nederland-bewust"
subtitel: "Startpagina met een bewuste missie"
intro: "Kan jouw innerlijk welzijn en/of fysieke gezondheid wel een steuntje in de rug gebruiken? Kom gemakkelijk in contact met aanbieders uit de regio."
missie_titel: "Missie"
missie_tekst: "Nederland-bewust brengt jou in verbinding met de Bewust-makers in jouw regio, professionals die je vanuit een holistische visie begeleiden naar een leven in balans."
visie_titel: "Visie"
visie_tekst: "Wij dromen van een samenleving waarin zelfbewustzijn vanzelfsprekend is. Een wereld waarin toekomstige generaties opgroeien met ruimte en aandacht om zichzelf écht te leren kennen."
visie_quote: "Een nieuwe generatie die leeft van binnenuit — vol vertrouwen, verbonden en bruisend van levenslust"
