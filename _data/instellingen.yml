inspiratie_titel: Je bloedwaarden zijn goed. Maar waarom voel je je dan zo slecht?
inspiratie_intro: "Veel vrouwen functioneren nog wel. Ze gaan naar hun werk,
  zorgen voor anderen. Maar worden moe wakker, voelen zich overprikkeld, hebben
  spierklachten of een kort lontje. En horen dan: alles ziet er goed uit."
