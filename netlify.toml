[build]
  command = "bundle exec jekyll build --config _config.yml,_config_netlify.yml"
  publish = "_site"

[build.environment]
  RUBY_VERSION = "3.2.0"
  JEKYLL_ENV = "production"

# /admin/ — alleen voor eigenaren (rol: eigenaar)
[[plugins]]
  package = "@netlify/plugin-gatsby"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/maker-beheer"
  to = "/maker-beheer/"
  status = 301

# Toegangsbeveiliging: /admin/ alleen voor rol "eigenaar"
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  conditions = {Role = ["eigenaar"]}

[[redirects]]
  from = "/admin/*"
  to = "/geen-toegang/"
  status = 302

# Toegangsbeveiliging: /maker-beheer/ alleen voor rol "maker" of "eigenaar"
[[redirects]]
  from = "/maker-beheer/*"
  to = "/maker-beheer/:splat"
  status = 200
  conditions = {Role = ["maker", "eigenaar"]}

[[redirects]]
  from = "/maker-beheer/*"
  to = "/geen-toegang/"
  status = 302

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
