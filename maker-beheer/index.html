---
layout: null
permalink: /maker-beheer/
---
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Nederland-Bewust — Mijn profiel beheren</title>
</head>
<body>
  <script>
    window.netlifyIdentityConfig = {
      APIUrl: "https://nederland-bewust-beheer.netlify.app/.netlify/identity"
    };
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // Gebruik maker-config in plaats van standaard config.yml
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: "git-gateway",
          branch: "main"
        },
        media_folder: "assets/images/makers",
        public_folder: "/assets/images/makers",
        publish_mode: "simple",
        locale: "nl",
        collections: [
          {
            name: "bewust-makers",
            label: "👤 Mijn profiel",
            label_singular: "Profiel",
            folder: "_bewust-makers",
            create: false,
            identifier_field: "naam",
            summary: "{{naam}} – {{praktijk}}",
            description: "Zoek jouw naam op en pas je profiel aan. Wijzigingen worden ter beoordeling aangeboden aan de eigenaren.",
            fields: [
              {label: "Naam", name: "naam", widget: "string"},
              {label: "Praktijknaam", name: "praktijk", widget: "string"},
              {label: "Profielfoto", name: "foto", widget: "image", required: false,
               hint: "Vierkant portretfoto, minimaal 400×400px. JPG of PNG."},
              {label: "Provincie", name: "provincie", widget: "select",
               options: ["Drenthe","Groningen","Friesland","Overijssel","Gelderland",
                         "Utrecht","Noord-Holland","Zuid-Holland","Zeeland",
                         "Noord-Brabant","Limburg","Flevoland"]},
              {label: "Stad / gemeente", name: "stad", widget: "string", required: false},
              {label: "Categorieën", name: "categorieen", widget: "select", multiple: true,
               options: ["Massage","Voeding","Bewegen","Meditatie","Coaching",
                         "Energetisch","Coaching met dieren","Kindgericht",
                         "Hulp voor huisdieren","Expressie / Creativiteit"]},
              {label: "Methoden / specialismen", name: "methoden", widget: "list",
               hint: "Eén methode per regel — bijv. REIKI, Voetreflexologie"},
              {label: "Klachten waarmee je werkt", name: "klachten", widget: "list", required: false,
               hint: "Eén klacht per regel — bijv. stress, burnout, rugpijn"},
              {label: "Omschrijving (zoekwoorden)", name: "omschrijving", widget: "text", required: false,
               hint: "Beschrijf je werk in steekwoorden. Helpt bezoekers jou te vinden."},
              {label: "Website", name: "website", widget: "string", required: false},
              {label: "E-mailadres (zichtbaar op profiel)", name: "email_zichtbaar",
               widget: "string", required: false},
              {label: "Telefoonnummer", name: "telefoon", widget: "string", required: false},
              {label: "Online sessies?", name: "online", widget: "select",
               options: ["Ja","Nee","Op aanvraag"], default: "Op aanvraag"},
              {label: "Sessieduur", name: "sessieduur", widget: "string", required: false,
               hint: "Bijv. 60 min of 60–90 min"},
              {label: "Tarief", name: "tarief", widget: "string", required: false},
              {label: "Eerste gesprek", name: "eerste_gesprek", widget: "select",
               options: ["Gratis kennismaking","Gratis (30 min)","Op aanvraag","Betaald"],
               default: "Gratis kennismaking"},
              {label: "Vergoeding zorgverzekeraar", name: "vergoeding", widget: "string", required: false},
              {label: "Jaren werkervaring", name: "ervaringsjaren", widget: "number",
               required: false, value_type: "int", min: 0, max: 50},
              {label: "Talen", name: "talen", widget: "list", default: ["Nederlands"]},
              {label: "Doelgroepen", name: "doelgroepen", widget: "list"},
              {label: "Opleidingen & certificeringen", name: "opleidingen", widget: "list"},
              {label: "Beroepsverenigingen", name: "verenigingen", widget: "list", required: false},
              {label: "Korte introductie", name: "bio", widget: "text",
               hint: "2–4 zinnen over wie je bent. Schrijf zoals je praat."},
              {label: "Waarom is dit jouw werk?", name: "waarom", widget: "text", required: false},
              {label: "Wat maakt jou anders?", name: "onderscheid", widget: "text", required: false},
              {label: "Voor wie — en voor wie niet?", name: "voor_wie", widget: "text", required: false},
              {label: "Wat zeggen cliënten?", name: "wat_zeggen_clienten", widget: "text", required: false},
              {label: "Wat geef je mee na een sessie?", name: "na_sessie", widget: "text", required: false},
              {label: "Gepubliceerd", name: "gepubliceerd", widget: "boolean", default: true},
              {label: "Uitgelicht", name: "uitgelicht", widget: "hidden", default: false},
              {label: "Lidmaatschap", name: "lidmaatschap", widget: "hidden", default: "Bewust-maker"}
            ]
          },
          {
            name: "agenda",
            label: "📅 Mijn agenda",
            label_singular: "Activiteit",
            folder: "_agenda",
            create: true,
            slug: "{{slug}}",
            summary: "{{datum}} – {{titel}}",
            description: "Voeg hier jouw workshops en evenementen toe. Ze verschijnen automatisch op de agenda-pagina na goedkeuring.",
            fields: [
              {label: "Titel activiteit", name: "titel", widget: "string"},
              {label: "Datum", name: "datum", widget: "datetime",
               format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false},
              {label: "Tijdstip", name: "tijdstip", widget: "string", required: false,
               hint: "Bijv. 09:00–11:00"},
              {label: "Locatie", name: "locatie", widget: "string", hint: "Stad of Online"},
              {label: "Organisator", name: "organisator", widget: "string",
               hint: "Jouw naam of praktijknaam"},
              {label: "Beschrijving", name: "beschrijving", widget: "text"},
              {label: "Aanmeldlink of contactinfo", name: "aanmeld", widget: "string", required: false},
              {label: "Gepubliceerd", name: "gepubliceerd", widget: "boolean", default: true}
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
